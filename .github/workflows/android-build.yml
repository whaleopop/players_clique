name: Android APK Build

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build & Release Android APK
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          LINE=$(grep '^version:' pubspec.yaml)
          VERSION=$(echo $LINE | sed 's/version: //; s/+.*//')
          BUILD=$(echo $LINE | sed 's/.*+//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT
        shell: bash

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/players_clique-v${{ steps.version.outputs.version }}.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: players_clique-apk
          path: build/app/outputs/flutter-apk/players_clique-v${{ steps.version.outputs.version }}.apk

      - name: Upload APK to GitHub Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/app/outputs/flutter-apk/players_clique-v${{ steps.version.outputs.version }}.apk
          tag: v${{ steps.version.outputs.version }}+${{ steps.version.outputs.build }}
          release_name: "v${{ steps.version.outputs.version }}+${{ steps.version.outputs.build }}"
          body: "Auto-generated release v${{ steps.version.outputs.version }}+${{ steps.version.outputs.build }}"
          overwrite: true
          make_latest: true
