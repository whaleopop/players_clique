name: Build & Release (Android + iOS)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1: Bump build number and push back to master
  # ────────────────────────────────────────────────────────────────────────────
  prepare:
    name: 📦 Prepare — Bump Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      new_build: ${{ steps.version.outputs.new_build }}
      sha: ${{ steps.push.outputs.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Extract & bump version
        id: version
        run: |
          LINE=$(grep '^version:' pubspec.yaml)
          VERSION=$(echo "$LINE" | sed 's/version: //; s/+.*//')
          BUILD=$(echo "$LINE" | sed 's/.*+//')
          [ -z "$BUILD" ] && BUILD=1
          NEW_BUILD=$((BUILD + 1))
          echo "version=$VERSION"   >> $GITHUB_OUTPUT
          echo "new_build=$NEW_BUILD" >> $GITHUB_OUTPUT
          sed -i "s/^version: .*/version: ${VERSION}+${NEW_BUILD}/" pubspec.yaml
          echo "✅ Bumped to $VERSION+$NEW_BUILD"
        shell: bash

      - name: Commit & push
        id: push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "⬆️ Bump build to ${{ steps.version.outputs.new_build }}"
          for i in {1..5}; do
            git pull --rebase origin master && git push && break || {
              echo "Push attempt $i failed, retrying in 3s..."
              sleep 3
            }
          done
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
        shell: bash

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2: Android APK + AAB
  # ────────────────────────────────────────────────────────────────────────────
  build-android:
    name: 🤖 Android APK
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (bumped commit)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          architecture: x64

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release \
            --build-name=${{ needs.prepare.outputs.version }} \
            --build-number=${{ needs.prepare.outputs.new_build }}

      - name: Build AAB
        run: |
          flutter build appbundle --release \
            --build-name=${{ needs.prepare.outputs.version }} \
            --build-number=${{ needs.prepare.outputs.new_build }}

      - name: Upload APK to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/app/outputs/flutter-apk/app-release.apk
          asset_name: players-clique-v${{ needs.prepare.outputs.version }}+${{ needs.prepare.outputs.new_build }}.apk
          tag: v${{ needs.prepare.outputs.version }}+${{ needs.prepare.outputs.new_build }}
          release_name: "Players Clique v${{ needs.prepare.outputs.version }}+${{ needs.prepare.outputs.new_build }}"
          body: |
            🚀 Авто-сборка

            **Version:** ${{ needs.prepare.outputs.version }}
            **Build:** ${{ needs.prepare.outputs.new_build }}
          overwrite: true
          make_latest: true

      - name: Upload AAB to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/app/outputs/bundle/release/app-release.aab
          asset_name: players-clique-v${{ needs.prepare.outputs.version }}+${{ needs.prepare.outputs.new_build }}.aab
          tag: v${{ needs.prepare.outputs.version }}+${{ needs.prepare.outputs.new_build }}
          overwrite: true

  # ────────────────────────────────────────────────────────────────────────────
  # Job 3: iOS IPA
  # ────────────────────────────────────────────────────────────────────────────
  build-ios:
    name: 🍎 iOS IPA
    needs: prepare
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (bumped commit)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          architecture: x64

      - name: Get dependencies
        run: flutter pub get

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Pod install (5 retries)
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.lowSpeedLimit 0
          git config --global http.lowSpeedTime 999
          cd ios
          for i in 1 2 3 4 5; do
            echo "🔄 Pod install attempt $i..."
            pod install --repo-update && break
            echo "❌ Failed, waiting $((i * 30))s..."
            sleep $((i * 30))
          done

      - name: Build iOS (no codesign)
        run: |
          flutter build ios --release --no-codesign \
            --build-name=${{ needs.prepare.outputs.version }} \
            --build-number=${{ needs.prepare.outputs.new_build }}
        env:
          CODE_SIGNING_ALLOWED: "NO"
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGN_IDENTITY: ""

      - name: Create IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -qq -r -9 FlutterApp.ipa Payload
          ls -lh FlutterApp.ipa

      - name: Upload IPA to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/ios/iphoneos/FlutterApp.ipa
          asset_name: players-clique-v${{ needs.prepare.outputs.version }}+${{ needs.prepare.outputs.new_build }}.ipa
          tag: v${{ needs.prepare.outputs.version }}+${{ needs.prepare.outputs.new_build }}
          overwrite: true
