name: Flutter CI Build & Release

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS & Android
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------
      # Flutter Setup
      # ----------------------------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          architecture: x64

      - name: Get dependencies
        run: flutter pub get

      # ----------------------------
      # Extract & Bump Version
      # ----------------------------
      - name: Extract version from pubspec.yaml
        id: version
        run: |
          LINE=$(grep '^version:' pubspec.yaml)
          VERSION=$(echo $LINE | sed 's/version: //; s/+.*//')
          BUILD=$(echo $LINE | sed 's/.*+//')
          NEW_BUILD=$((BUILD + 1))

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT
          echo "new_build=$NEW_BUILD" >> $GITHUB_OUTPUT
        shell: bash

      - name: Bump build number
        run: |
          sed -i.bak "s/^version: .*/version: ${{ steps.version.outputs.version }}+${{ steps.version.outputs.new_build }}/" pubspec.yaml
          rm pubspec.yaml.bak

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "CI: Bump build to ${{ steps.version.outputs.new_build }}"
          git push
        shell: bash

      # ----------------------------
      # iOS BUILD (NO CODESIGN)
      # ----------------------------
      - name: Build iOS (no codesign)
        run: |
          flutter clean
          flutter pub get
          flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          mv Runner.app Payload/
          zip -qq -r -9 FlutterApp.ipa Payload

      # ----------------------------
      # Android BUILD
      # ----------------------------
      - name: Build Android APK
        run: flutter build apk --release

      # ----------------------------
      # Upload Artifacts
      # ----------------------------
      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-IPA
          path: build/ios/iphoneos/FlutterApp.ipa

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: build/app/outputs/flutter-apk/app-release.apk

      # ----------------------------
      # Create GitHub Release
      # ----------------------------
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}+${{ steps.version.outputs.new_build }}
          name: v${{ steps.version.outputs.version }}+${{ steps.version.outputs.new_build }}
          body: |
            🚀 Auto build release
            
            iOS IPA + Android APK
            
            Version: ${{ steps.version.outputs.version }}
            Build: ${{ steps.version.outputs.new_build }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload IPA to Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/ios/iphoneos/FlutterApp.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}