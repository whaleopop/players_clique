name: Flutter CI Build & Release

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS & Android
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      # ----------------------------
      # Checkout
      # ----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------
      # Flutter setup
      # ----------------------------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          architecture: x64

      - name: Get dependencies
        run: flutter pub get

      # ----------------------------
      # Extract version from pubspec
      # ----------------------------
      - name: Extract version info
        id: version
        run: |
          LINE=$(grep '^version:' pubspec.yaml)
          VERSION=$(echo $LINE | sed 's/version: //; s/+.*//')
          BUILD=$(echo $LINE | sed 's/.*+//')

          if [ -z "$BUILD" ]; then
            BUILD=1
          fi

          NEW_BUILD=$((BUILD + 1))

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT
          echo "new_build=$NEW_BUILD" >> $GITHUB_OUTPUT
        shell: bash

      # ----------------------------
      # CocoaPods cache
      # ----------------------------
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-

      # ----------------------------
      # iOS build (NO CODESIGN)
      # ----------------------------
      - name: Pod install (with retry)
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.lowSpeedLimit 0
          git config --global http.lowSpeedTime 999
          cd ios
          for i in 1 2 3 4 5; do
            echo "Attempt $i..."
            pod install --repo-update && break
            echo "Failed, waiting $((i * 30))s..."
            sleep $((i * 30))
          done

      - name: Build iOS
        run: |
          flutter build ios --release --no-codesign \
            --build-name=${{ steps.version.outputs.version }} \
            --build-number=${{ steps.version.outputs.new_build }}
        env:
          CODE_SIGNING_ALLOWED: "NO"
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGN_IDENTITY: ""

      - name: Create IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          mv Runner.app Payload/
          zip -qq -r -9 FlutterApp.ipa Payload

      # ----------------------------
      # Android build
      # ----------------------------
      - name: Build Android APK
        run: |
          flutter build apk --release \
            --build-name=${{ steps.version.outputs.version }} \
            --build-number=${{ steps.version.outputs.new_build }}

      # ----------------------------
      # Upload artifacts (Actions tab)
      # ----------------------------
      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-IPA
          path: build/ios/iphoneos/FlutterApp.ipa

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: build/app/outputs/flutter-apk/app-release.apk

      # ----------------------------
      # Create GitHub Release
      # ----------------------------
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}+${{ steps.version.outputs.new_build }}
          name: v${{ steps.version.outputs.version }}+${{ steps.version.outputs.new_build }}
          body: |
            🚀 Auto build release
            
            Version: ${{ steps.version.outputs.version }}
            Build: ${{ steps.version.outputs.new_build }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload IPA to Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/ios/iphoneos/FlutterApp.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}